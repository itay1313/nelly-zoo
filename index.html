<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#5bc0de">
<title>גן החיות של נלי</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

  :root {
    --sky: #8ed6ff;
    --grass: #7bd66a;
    --sun: #ffd93d;
    --card: #ffffff;
    --ink: #3a3a5a;
  }

  html, body {
    height: 100%;
    font-family: -apple-system, "Varela Round", "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
  }

  body {
    background: linear-gradient(180deg, #8ed6ff 0%, #c9f0a8 55%, #9be86a 100%);
    display: flex;
    flex-direction: column;
    height: 100dvh;
    touch-action: manipulation;
  }

  /* ---------- כותרת ---------- */
  header {
    flex: 0 0 auto;
    text-align: center;
    padding: 14px 10px 6px;
  }
  header h1 {
    font-size: clamp(26px, 7vw, 40px);
    color: #fff;
    text-shadow: 0 3px 0 rgba(0,0,0,.12), 0 0 14px rgba(255,255,255,.4);
    letter-spacing: 1px;
  }
  header h1 .paw { font-size: .9em; }

  /* ---------- כרטיס חיה ראשי ---------- */
  .stage {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px 14px;
    min-height: 0;
  }

  .card {
    background: var(--card);
    border-radius: 34px;
    box-shadow: 0 14px 30px rgba(60,60,120,.22), inset 0 -6px 0 rgba(0,0,0,.04);
    width: 100%;
    max-width: 440px;
    padding: 18px 16px 22px;
    text-align: center;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .emoji {
    font-size: clamp(90px, 30vw, 170px);
    line-height: 1.05;
    filter: drop-shadow(0 10px 10px rgba(0,0,0,.15));
    cursor: pointer;
  }
  .emoji.pop { animation: pop .5s ease; }
  @keyframes pop {
    0% { transform: scale(.4) rotate(-12deg); opacity: 0; }
    60% { transform: scale(1.15) rotate(6deg); }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .emoji.wiggle { animation: wiggle .5s ease; }
  @keyframes wiggle {
    0%,100% { transform: rotate(0); }
    25% { transform: rotate(-9deg) scale(1.06); }
    75% { transform: rotate(9deg) scale(1.06); }
  }

  .name-he {
    font-size: clamp(30px, 9vw, 46px);
    font-weight: 800;
    color: var(--ink);
  }
  .name-en {
    font-size: clamp(20px, 6vw, 30px);
    font-weight: 700;
    color: #ff7eb3;
    direction: ltr;
    letter-spacing: .5px;
  }

  /* ---------- כפתור הקול ---------- */
  .speak-btn {
    margin-top: 8px;
    border: none;
    background: linear-gradient(180deg, #ffd93d, #ffb43d);
    color: #6b4500;
    font-size: clamp(20px, 6vw, 26px);
    font-weight: 800;
    font-family: inherit;
    padding: 14px 26px;
    border-radius: 999px;
    box-shadow: 0 7px 0 #e09a1f, 0 10px 18px rgba(0,0,0,.18);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: transform .08s, box-shadow .08s;
  }
  .speak-btn:active {
    transform: translateY(5px);
    box-shadow: 0 2px 0 #e09a1f, 0 4px 10px rgba(0,0,0,.18);
  }
  .speak-btn.speaking { animation: glow .8s ease infinite; }
  @keyframes glow {
    0%,100% { box-shadow: 0 7px 0 #e09a1f, 0 0 0 0 rgba(255,217,61,.6); }
    50% { box-shadow: 0 7px 0 #e09a1f, 0 0 0 14px rgba(255,217,61,0); }
  }

  /* ---------- חצים ---------- */
  .nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 100%;
    left: 0;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
    padding: 0 4px;
  }
  .arrow {
    pointer-events: auto;
    width: 58px; height: 58px;
    border: none;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 5px 0 rgba(0,0,0,.12), 0 8px 16px rgba(0,0,0,.15);
    font-size: 30px;
    color: var(--ink);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .arrow:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,.12); }

  .counter {
    flex: 0 0 auto;
    text-align: center;
    color: #fff;
    font-weight: 700;
    font-size: 16px;
    padding: 2px 0 6px;
    text-shadow: 0 1px 2px rgba(0,0,0,.2);
  }

  /* ---------- מגירת כל החיות ---------- */
  .all-btn {
    flex: 0 0 auto;
    margin: 0 auto 10px;
    background: rgba(255,255,255,.9);
    border: none;
    border-radius: 999px;
    padding: 11px 22px;
    font-family: inherit;
    font-size: 18px;
    font-weight: 800;
    color: var(--ink);
    box-shadow: 0 5px 0 rgba(0,0,0,.1);
    cursor: pointer;
  }
  .all-btn:active { transform: translateY(3px); }

  .sheet {
    position: fixed;
    inset: 0;
    background: rgba(40,40,80,.45);
    backdrop-filter: blur(3px);
    display: none;
    align-items: flex-end;
    z-index: 50;
  }
  .sheet.open { display: flex; animation: fade .2s ease; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

  .sheet-inner {
    background: #fff;
    width: 100%;
    max-height: 80dvh;
    border-radius: 30px 30px 0 0;
    padding: 14px 14px 24px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    animation: slideup .28s cubic-bezier(.2,.9,.3,1.1);
  }
  @keyframes slideup { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .sheet-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; padding: 0 6px;
  }
  .sheet-head h2 { font-size: 24px; color: var(--ink); }
  .close-x {
    border: none; background: #ffe1ec; color: #ff5d8f;
    width: 40px; height: 40px; border-radius: 50%;
    font-size: 22px; font-weight: 800; cursor: pointer;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
    gap: 10px;
  }
  .tile {
    background: #f4f8ff;
    border: 3px solid transparent;
    border-radius: 20px;
    padding: 10px 4px 8px;
    text-align: center;
    cursor: pointer;
    transition: transform .1s;
  }
  .tile:active { transform: scale(.92); }
  .tile.active { border-color: #ffb43d; background: #fff6e0; }
  .tile .te { font-size: 40px; line-height: 1; }
  .tile .tn { font-size: 13px; font-weight: 700; color: var(--ink); margin-top: 3px; }
</style>
</head>
<body>

  <header>
    <h1><span class="paw">🐾</span> גן החיות של נלי <span class="paw">🐾</span></h1>
  </header>

  <div class="stage">
    <div class="card">
      <nav class="nav">
        <button class="arrow" id="prev" aria-label="הקודם">›</button>
        <button class="arrow" id="next" aria-label="הבא">‹</button>
      </nav>
      <div class="emoji" id="emoji">🦁</div>
      <div class="name-he" id="nameHe">אריה</div>
      <div class="name-en" id="nameEn">Lion</div>
      <button class="speak-btn" id="speak">🔊 איך אומרים?</button>
    </div>
  </div>

  <div class="counter" id="counter"></div>

  <button class="all-btn" id="openAll">🐘 כל החיות</button>

  <div class="sheet" id="sheet">
    <div class="sheet-inner">
      <div class="sheet-head">
        <h2>בחרו חיה 🦒</h2>
        <button class="close-x" id="closeSheet">✕</button>
      </div>
      <div class="grid" id="grid"></div>
    </div>
  </div>

<script>
  const ANIMALS = [
    { e:"🦁", he:"אַרְיֵה",   en:"Lion" },
    { e:"🐯", he:"נָמֵר",     en:"Tiger" },
    { e:"🐘", he:"פִּיל",      en:"Elephant" },
    { e:"🦒", he:"גִ'ירָפָה",  en:"Giraffe" },
    { e:"🦓", he:"זֶבְּרָה",    en:"Zebra" },
    { e:"🐒", he:"קוֹף",       en:"Monkey" },
    { e:"🦍", he:"גּוֹרִילָה",  en:"Gorilla" },
    { e:"🐻", he:"דֹּב",       en:"Bear" },
    { e:"🐼", he:"פַּנְדָּה",    en:"Panda" },
    { e:"🐨", he:"קוֹאָלָה",    en:"Koala" },
    { e:"🦘", he:"קֶנְגּוּרוּ",  en:"Kangaroo" },
    { e:"🐊", he:"תַּנִּין",     en:"Crocodile" },
    { e:"🦛", he:"הִיפּוֹפּוֹטָם", en:"Hippo" },
    { e:"🦏", he:"קַרְנַף",     en:"Rhino" },
    { e:"🐍", he:"נָחָשׁ",      en:"Snake" },
    { e:"🦎", he:"לְטָאָה",     en:"Lizard" },
    { e:"🐢", he:"צָב",        en:"Turtle" },
    { e:"🦩", he:"פְלָמִינְגּוֹ", en:"Flamingo" },
    { e:"🦜", he:"תֻּכִּי",      en:"Parrot" },
    { e:"🦚", he:"טַוָּס",      en:"Peacock" },
    { e:"🦉", he:"יַנְשׁוּף",    en:"Owl" },
    { e:"🦅", he:"נֶשֶׁר",      en:"Eagle" },
    { e:"🐧", he:"פִּינְגְּוִין",  en:"Penguin" },
    { e:"🦦", he:"לוּטְרָה",     en:"Otter" },
    { e:"🦫", he:"בּוֹנֶה",      en:"Beaver" },
    { e:"🦊", he:"שׁוּעָל",     en:"Fox" },
    { e:"🐺", he:"זְאֵב",       en:"Wolf" },
    { e:"🦌", he:"אַיָּל",      en:"Deer" },
    { e:"🐪", he:"גָּמָל",      en:"Camel" },
    { e:"🦔", he:"קִיפּוֹד",     en:"Hedgehog" },
  ];

  let idx = 0;

  const emojiEl  = document.getElementById("emoji");
  const nameHeEl = document.getElementById("nameHe");
  const nameEnEl = document.getElementById("nameEn");
  const counterEl= document.getElementById("counter");
  const speakBtn = document.getElementById("speak");

  /* ----- קול אנגלי ----- */
  let enVoice = null;
  function pickVoice() {
    const voices = speechSynthesis.getVoices();
    enVoice = voices.find(v => /en[-_]US/i.test(v.lang) && /female|samantha|zira|google/i.test(v.name))
           || voices.find(v => /^en/i.test(v.lang))
           || null;
  }
  if ('speechSynthesis' in window) {
    pickVoice();
    speechSynthesis.onvoiceschanged = pickVoice;
  }

  function speak(text) {
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    u.rate = 0.78;      // לאט וברור לילדים
    u.pitch = 1.15;
    if (enVoice) u.voice = enVoice;
    u.onstart = () => speakBtn.classList.add("speaking");
    u.onend   = () => speakBtn.classList.remove("speaking");
    speechSynthesis.speak(u);
  }

  /* ----- הצגת חיה ----- */
  function render(animate = "pop") {
    const a = ANIMALS[idx];
    emojiEl.textContent  = a.e;
    nameHeEl.textContent = a.he;
    nameEnEl.textContent = a.en;
    counterEl.textContent = `${idx + 1} / ${ANIMALS.length}`;
    emojiEl.classList.remove("pop","wiggle");
    void emojiEl.offsetWidth;            // restart animation
    emojiEl.classList.add(animate);
    // סמן ברשת
    document.querySelectorAll(".tile").forEach((t,i) =>
      t.classList.toggle("active", i === idx));
  }

  function go(step) {
    idx = (idx + step + ANIMALS.length) % ANIMALS.length;
    render("pop");
  }

  document.getElementById("next").onclick = () => go(1);
  document.getElementById("prev").onclick = () => go(-1);
  speakBtn.onclick = () => { speak(ANIMALS[idx].en); emojiEl.classList.remove("wiggle"); void emojiEl.offsetWidth; emojiEl.classList.add("wiggle"); };
  emojiEl.onclick = () => speak(ANIMALS[idx].en);

  /* החלקה עם האצבע */
  let touchX = null;
  document.querySelector(".stage").addEventListener("touchstart", e => touchX = e.touches[0].clientX, {passive:true});
  document.querySelector(".stage").addEventListener("touchend", e => {
    if (touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 50) go(dx > 0 ? 1 : -1); // RTL: החלקה ימינה = הבא
    touchX = null;
  }, {passive:true});

  /* ----- רשת כל החיות ----- */
  const grid = document.getElementById("grid");
  ANIMALS.forEach((a, i) => {
    const t = document.createElement("button");
    t.className = "tile";
    t.innerHTML = `<div class="te">${a.e}</div><div class="tn">${a.he}</div>`;
    t.onclick = () => { idx = i; render("pop"); speak(a.en); closeSheet(); };
    grid.appendChild(t);
  });

  const sheet = document.getElementById("sheet");
  function openSheet()  { sheet.classList.add("open"); }
  function closeSheet() { sheet.classList.remove("open"); }
  document.getElementById("openAll").onclick   = openSheet;
  document.getElementById("closeSheet").onclick = closeSheet;
  sheet.addEventListener("click", e => { if (e.target === sheet) closeSheet(); });

  render("pop");
</script>
</body>
</html>
