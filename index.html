<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#8ed6ff">
<meta name="description" content="גן החיות של נלי — אפליקציית למידה לילדים. לומדים שמות חיות בעברית ואנגלית עם קולות וצלילים.">
<meta name="keywords" content="גן חיות, ילדים, למידה, חיות, עברית, אנגלית, nelly zoo, kids learning, animals">
<meta name="robots" content="index, follow">
<meta name="author" content="Nelly Zoo">
<meta property="og:title" content="גן החיות של נלי">
<meta property="og:description" content="אפליקציית למידה לילדים — חיות עם קולות ותמונות">
<meta property="og:type" content="website">
<meta property="og:locale" content="he_IL">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
<title>גן החיות של נלי</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html, body { height:100%; font-family:"Varela Round",-apple-system,"Segoe UI",system-ui,sans-serif; overflow:hidden; }
  body {
    height:100dvh; display:flex; flex-direction:column;
    background:linear-gradient(180deg,#7ec8ff 0%,#aee3ff 45%,#d8f5b0 72%,#9be86a 100%);
    touch-action:manipulation; position:relative;
  }

  /* ---------- רקע ---------- */
  .bg { position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:0; }
  .sun { position:absolute; top:8px; left:14px; width:64px; height:64px; border-radius:50%;
    background:radial-gradient(circle at 40% 40%,#fff3a8,#ffd93d);
    box-shadow:0 0 26px 10px rgba(255,217,61,.6); animation:spin 30s linear infinite; }
  .sun::before { content:""; position:absolute; inset:-12px; border-radius:50%;
    background:repeating-conic-gradient(rgba(255,217,61,.5) 0 8deg,transparent 8deg 22deg); z-index:-1; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .cloud { position:absolute; background:#fff; border-radius:50px; opacity:.92;
    filter:drop-shadow(0 6px 8px rgba(0,0,0,.06)); }
  .cloud::before,.cloud::after { content:""; position:absolute; background:#fff; border-radius:50%; }
  .c1 { width:90px; height:30px; top:60px; animation:drift1 26s linear infinite; }
  .c1::before { width:42px; height:42px; top:-18px; left:14px; }
  .c1::after  { width:30px; height:30px; top:-12px; left:48px; }
  .c2 { width:70px; height:24px; top:130px; opacity:.8; animation:drift2 34s linear infinite; }
  .c2::before { width:34px; height:34px; top:-14px; left:10px; }
  .c2::after  { width:26px; height:26px; top:-9px; left:40px; }
  @keyframes drift1 { from{right:-120px} to{right:110%} }
  @keyframes drift2 { from{right:-100px} to{right:110%} }
  .hills { position:absolute; bottom:0; left:0; width:100%; height:120px;
    background:radial-gradient(120% 80px at 25% 100%,#7bd35a 60%,transparent 61%),
               radial-gradient(120% 90px at 80% 100%,#6cc94d 60%,transparent 61%); }

  /* ---------- תוכן ---------- */
  header,.stage,.progress-wrap,.all-btn { position:relative; z-index:1; }
  header { flex:0 0 auto; text-align:center; padding:clamp(6px,1.5vh,12px) 10px 4px; }
  header h1 {
    font-size:clamp(22px,6vw,40px); color:#fff; font-weight:800; letter-spacing:1px;
    text-shadow:0 3px 0 #ff9ec4,0 4px 0 #f17fad,0 0 16px rgba(255,255,255,.5);
  }
  .paw { font-size:.85em; }

  .stage { flex:1 1 auto; display:flex; align-items:center; justify-content:center; padding:6px 12px; min-height:0; }

  .card {
    --tint:#fff3c4;
    background:linear-gradient(180deg,#ffffff 0%,var(--tint) 100%);
    border:5px solid #fff; border-radius:clamp(24px,5vw,38px);
    box-shadow:0 16px 0 rgba(0,0,0,.07),0 18px 36px rgba(60,60,120,.25);
    width:100%; max-width:440px; max-height:100%; padding:clamp(10px,2vh,16px) 16px clamp(12px,2vh,18px);
    text-align:center; position:relative;
    display:flex; flex-direction:column; align-items:center; gap:clamp(3px,1vh,6px);
    transition:background .35s;
  }

  /* ---------- תמונת החיה ---------- */
  .animal-view {
    position:relative;
    width:min(220px,52vw,30vh); height:min(220px,52vw,30vh);
    border-radius:26px; overflow:hidden;
    background:rgba(0,0,0,.04);
    cursor:pointer; flex-shrink:0;
    box-shadow:0 8px 20px rgba(0,0,0,.14);
  }
  .animal-photo {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; border-radius:22px;
    opacity:0; transition:opacity .4s;
  }
  .animal-photo.show { opacity:1; }
  .animal-emoji {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:clamp(80px,24vw,140px); line-height:1;
    filter:drop-shadow(0 8px 8px rgba(0,0,0,.15));
    transition:opacity .3s;
  }
  .animal-photo.show + .animal-emoji { opacity:0; }

  .animal-view.pop    { animation:pop .55s cubic-bezier(.2,.9,.3,1.4); }
  .animal-view.wiggle { animation:wiggle .5s ease; }
  @keyframes pop {
    0%{transform:scale(.3) rotate(-14deg);opacity:0}
    60%{transform:scale(1.18) rotate(7deg)}
    100%{transform:scale(1) rotate(0);opacity:1}
  }
  @keyframes wiggle {
    0%,100%{transform:rotate(0)}
    25%{transform:rotate(-10deg) scale(1.08)}
    75%{transform:rotate(10deg) scale(1.08)}
  }

  .name-he {
    font-size:clamp(26px,7vw,44px); font-weight:800; color:#3a3a5a;
    cursor:pointer; border-radius:12px; padding:2px 10px;
    transition:background .15s;
  }
  .name-he:active { background:rgba(0,0,0,.06); }
  .name-he-hint { font-size:13px; color:#aaa; margin-top:-4px; }
  .name-en { font-size:clamp(16px,5vw,28px); font-weight:700; color:#ff5d9e; direction:ltr; }

  /* ---------- כפתורים ---------- */
  .actions { display:flex; flex-direction:column; align-items:center; gap:clamp(6px,1.2vh,10px); margin-top:4px; width:100%; }
  .say-row { display:flex; gap:clamp(8px,2vw,12px); width:100%; max-width:340px; justify-content:center; }
  .say-row .btn { flex:1 1 0; justify-content:center; min-width:0; }
  .btn {
    border:none; font-family:inherit; font-weight:800; cursor:pointer;
    border-radius:999px; padding:clamp(9px,1.6vh,13px) clamp(12px,3.4vw,18px); font-size:clamp(14px,3.6vw,19px);
    display:inline-flex; align-items:center; gap:6px;
    transition:transform .08s,box-shadow .08s;
  }
  .btn:active { transform:translateY(5px); }
  .btn-sound { background:linear-gradient(180deg,#ffd93d,#ffae3b); color:#7a4d00;
    box-shadow:0 7px 0 #e0921f,0 10px 16px rgba(0,0,0,.18); }
  .btn-sound:active { box-shadow:0 2px 0 #e0921f; }
  .btn-say-he { background:linear-gradient(180deg,#b8f5a0,#5ed43a); color:#1a5200;
    box-shadow:0 7px 0 #3a9020,0 10px 16px rgba(0,0,0,.18); }
  .btn-say-he:active { box-shadow:0 2px 0 #3a9020; }
  .btn-say { background:linear-gradient(180deg,#6fe3ff,#3bb6ff); color:#054a73;
    box-shadow:0 7px 0 #1f8fd0,0 10px 16px rgba(0,0,0,.18); }
  .btn-say:active { box-shadow:0 2px 0 #1f8fd0; }
  .btn.playing { animation:pulse .7s ease infinite; }
  @keyframes pulse { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.2)} }

  /* ---------- חצים ---------- */
  .nav { position:absolute; top:46%; left:0; width:100%; display:flex; justify-content:space-between;
    transform:translateY(-50%); pointer-events:none; padding:0 2px; }
  .arrow { pointer-events:auto; width:54px; height:54px; border:none; border-radius:50%;
    background:#fff; box-shadow:0 5px 0 rgba(0,0,0,.12),0 8px 16px rgba(0,0,0,.15);
    font-size:22px; color:#5b5b80; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .arrow:active { transform:translateY(4px); box-shadow:0 1px 0 rgba(0,0,0,.12); }

  /* ---------- פס התקדמות ---------- */
  .progress-wrap {
    flex:0 0 auto; padding:4px 20px 2px;
    display:flex; flex-direction:column; align-items:center; gap:3px;
  }
  .progress-label {
    color:#fff; font-weight:800; font-size:14px;
    text-shadow:0 1px 2px rgba(0,0,0,.2);
  }
  .progress-track {
    width:160px; height:10px; background:rgba(255,255,255,.35);
    border-radius:999px; overflow:hidden;
  }
  .progress-fill {
    height:100%; border-radius:999px;
    background:linear-gradient(90deg,#ffd93d,#ff9ec4);
    transition:width .4s cubic-bezier(.2,.9,.3,1.2);
    width:0%;
  }

  .all-btn { flex:0 0 auto; margin:0 auto clamp(8px,2vh,12px); background:#fff; border:none; border-radius:999px;
    padding:clamp(8px,1.4vh,11px) 24px; font-family:inherit; font-size:clamp(15px,4vw,17px); font-weight:800; color:#3a3a5a;
    box-shadow:0 6px 0 rgba(0,0,0,.12); cursor:pointer; }
  .all-btn:active { transform:translateY(3px); box-shadow:0 2px 0 rgba(0,0,0,.12); }

  /* ---------- ניצוצות ---------- */
  .spark { position:fixed; font-size:26px; pointer-events:none; z-index:60; animation:spark .7s ease-out forwards; }
  @keyframes spark {
    0%{transform:translate(0,0) scale(.4);opacity:1}
    100%{transform:translate(var(--dx),var(--dy)) scale(1.3) rotate(40deg);opacity:0}
  }

  /* ---------- מגירת כל החיות ---------- */
  .sheet { position:fixed; inset:0; background:rgba(40,40,80,.45); backdrop-filter:blur(3px);
    display:none; align-items:flex-end; z-index:50; }
  .sheet.open { display:flex; animation:fade .2s ease; }
  @keyframes fade { from{opacity:0} to{opacity:1} }
  .sheet-inner { background:#fff; width:100%; max-height:82dvh; border-radius:30px 30px 0 0;
    padding:14px 14px 26px; overflow-y:auto; -webkit-overflow-scrolling:touch;
    animation:slideup .3s cubic-bezier(.2,.9,.3,1.1); }
  @keyframes slideup { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .sheet-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; padding:0 6px; }
  .sheet-head h2 { font-size:24px; color:#3a3a5a; }
  .close-x { border:none; background:#ffe1ec; color:#ff5d8f; width:42px; height:42px;
    border-radius:50%; font-size:22px; font-weight:800; cursor:pointer; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(84px,1fr)); gap:10px; }
  .tile { background:#f4f8ff; border:3px solid transparent; border-radius:22px; padding:10px 4px 8px;
    text-align:center; cursor:pointer; transition:transform .1s; }
  .tile:active { transform:scale(.9); }
  .tile.active { border-color:#ffae3b; background:#fff6e0; }
  .tile .te { font-size:40px; line-height:1; }
  .tile .tn { font-size:16px; font-weight:700; color:#3a3a5a; margin-top:4px; }

  /* ---------- אינדיקטור טעינת קול ---------- */
  #loadingDot {
    position:absolute; top:8px; right:8px;
    width:12px; height:12px; border-radius:50%;
    background:#ffd93d; display:none;
    animation:blink .6s ease infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* ---------- חגיגה ---------- */
  .celebrate {
    position:fixed; inset:0; z-index:100;
    background:rgba(30,20,60,.6); backdrop-filter:blur(4px);
    display:flex; align-items:center; justify-content:center;
    animation:fade .3s ease;
  }
  .celebrate-inner {
    background:#fff; border-radius:36px; padding:36px 32px 28px;
    text-align:center; max-width:320px; width:88%;
    box-shadow:0 24px 0 rgba(0,0,0,.1),0 28px 48px rgba(60,60,120,.3);
    animation:pop .6s cubic-bezier(.2,.9,.3,1.4);
  }
  .celebrate-emoji { font-size:72px; line-height:1; margin-bottom:12px; }
  .celebrate-title { font-size:32px; font-weight:800; color:#3a3a5a; margin-bottom:8px; }
  .celebrate-sub { font-size:18px; color:#888; margin-bottom:24px; }
  .celebrate-btn {
    border:none; font-family:inherit; font-weight:800; cursor:pointer;
    border-radius:999px; padding:14px 28px; font-size:18px;
    background:linear-gradient(180deg,#ffd93d,#ffae3b); color:#7a4d00;
    box-shadow:0 7px 0 #e0921f; transition:transform .08s,box-shadow .08s;
  }
  .celebrate-btn:active { transform:translateY(5px); box-shadow:0 2px 0 #e0921f; }

  /* ---------- משחק "מי אני?" ---------- */
  .game-btn {
    flex:0 0 auto; margin:0 auto 6px; border:none; border-radius:999px;
    padding:clamp(8px,1.4vh,11px) 26px; font-family:inherit; font-size:clamp(15px,4.2vw,18px); font-weight:800; color:#fff;
    background:linear-gradient(180deg,#ff8fc0,#ff4f9a);
    box-shadow:0 6px 0 #d62e78,0 8px 16px rgba(0,0,0,.2); cursor:pointer;
    transition:transform .08s,box-shadow .08s;
  }
  .game-btn:active { transform:translateY(3px); box-shadow:0 2px 0 #d62e78; }

  .game { position:fixed; inset:0; z-index:90; display:none;
    background:linear-gradient(180deg,#7ec8ff 0%,#aee3ff 45%,#d8f5b0 72%,#9be86a 100%);
    flex-direction:column; align-items:center; }
  .game.open { display:flex; animation:fade .25s ease; }
  .game-head { width:100%; display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px 6px; }
  .game-head h2 { font-size:22px; color:#fff; font-weight:800; text-shadow:0 2px 3px rgba(0,0,0,.2); }
  .game-score { color:#fff; font-weight:800; font-size:18px; text-shadow:0 1px 2px rgba(0,0,0,.2); }
  .game-prompt { text-align:center; color:#fff; font-weight:800;
    font-size:clamp(20px,5.5vw,26px); padding:8px 16px 2px; text-shadow:0 2px 4px rgba(0,0,0,.22); }
  .game-listen {
    margin:14px auto 6px; border:none; cursor:pointer;
    width:120px; height:120px; border-radius:50%; font-size:60px;
    background:linear-gradient(180deg,#ffd93d,#ffae3b);
    box-shadow:0 10px 0 #e0921f,0 12px 22px rgba(0,0,0,.22);
    display:flex; align-items:center; justify-content:center;
    transition:transform .08s,box-shadow .08s;
  }
  .game-listen:active { transform:translateY(6px); box-shadow:0 3px 0 #e0921f; }
  .game-listen.pulse { animation:pulse .7s ease infinite; }
  .game-options {
    display:grid; grid-template-columns:1fr 1fr; gap:14px;
    width:100%; max-width:420px; padding:18px 18px 0; margin-top:auto; margin-bottom:auto;
  }
  .game-opt {
    background:#fff; border:4px solid #fff; border-radius:28px; cursor:pointer;
    padding:14px 6px 12px; text-align:center;
    box-shadow:0 8px 0 rgba(0,0,0,.12); transition:transform .1s;
  }
  .game-opt:active { transform:scale(.93); }
  .game-opt .oe { font-size:clamp(48px,14vw,72px); line-height:1; }
  .game-opt .on { font-size:18px; font-weight:800; color:#3a3a5a; margin-top:4px; }
  .game-opt.correct { border-color:#5ed43a; background:#eafce2; animation:rightWiggle .5s ease; }
  .game-opt.wrong   { border-color:#ff5d6c; background:#ffeaec; animation:shake .4s ease; }
  @keyframes rightWiggle { 0%,100%{transform:scale(1)} 40%{transform:scale(1.12) rotate(4deg)} 70%{transform:scale(1.05) rotate(-3deg)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  .game-feedback {
    min-height:30px; font-size:22px; font-weight:800; color:#fff;
    padding:8px 0 14px; text-shadow:0 2px 3px rgba(0,0,0,.22); text-align:center;
  }

  /* ---------- רספונסיביות: מסכים נמוכים ---------- */
  @media (max-height:680px) {
    header { padding:4px 10px 2px; }
    .animal-view { width:min(180px,46vw,26vh); height:min(180px,46vw,26vh); }
    .name-he { font-size:clamp(22px,6vw,34px); }
    .name-en { font-size:clamp(14px,4.4vw,22px); }
    .progress-track { height:8px; }
  }
  /* ---------- רספונסיביות: נחיתה (landscape) ---------- */
  @media (max-height:520px) and (orientation:landscape) {
    body { overflow-y:auto; }
    .stage { align-items:flex-start; }
    .card { flex-direction:row; flex-wrap:wrap; max-width:680px; gap:10px 18px; padding:12px 16px; }
    .animal-view { width:min(150px,38vw,60vh); height:min(150px,38vw,60vh); }
    .actions { width:100%; }
  }
</style>
</head>
<body>

<div class="bg">
  <div class="sun"></div>
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="hills"></div>
</div>

<header><h1><span class="paw">🐾</span> גן החיות של נלי <span class="paw">🐾</span></h1></header>

<div class="stage">
  <div class="card" id="card">
    <div id="loadingDot"></div>
    <nav class="nav">
      <button class="arrow" id="prev" aria-label="הקודם">▶</button>
      <button class="arrow" id="next" aria-label="הבא">◀</button>
    </nav>
    <div class="animal-view" id="animalView">
      <img class="animal-photo" id="animalPhoto" alt="">
      <div class="animal-emoji" id="emoji">🦁</div>
    </div>
    <div class="name-he" id="nameHe" title="לחץ לשמוע בעברית">אַרְיֵה</div>
    <div class="name-en" id="nameEn">Lion</div>
    <div class="actions">
      <button class="btn btn-sound" id="sound">🐾 איזה קול?</button>
      <div class="say-row">
        <button class="btn btn-say-he" id="sayHe">🗣️ עברית</button>
        <button class="btn btn-say" id="say">🔊 English</button>
      </div>
    </div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-label" id="counter"></div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>
<button class="game-btn" id="openGame">🎮 משחק: מי אני?</button>
<button class="all-btn" id="openAll">🐘 כל החיות</button>

<div class="game" id="game">
  <div class="game-head">
    <h2>🎧 מי אני?</h2>
    <div class="game-score" id="gameScore">⭐ 0</div>
    <button class="close-x" id="closeGame">✕</button>
  </div>
  <div class="game-prompt">תשמעו את הקול ותבחרו את החיה!</div>
  <button class="game-listen" id="gameListen" aria-label="שמע שוב">🔊</button>
  <div class="game-options" id="gameOptions"></div>
  <div class="game-feedback" id="gameFeedback"></div>
</div>

<div class="sheet" id="sheet">
  <div class="sheet-inner">
    <div class="sheet-head">
      <h2>בחרו חיה 🦒</h2>
      <button class="close-x" id="closeSheet">✕</button>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<script>
const ANIMALS = [
  { e:"🦁", he:"אַרְיֵה",      en:"Lion",       wiki:"Lion",                  f:"lion.mp3",      t:"#ffe2a8" },
  { e:"🐯", he:"נָמֵר",        en:"Tiger",      wiki:"Tiger",                 f:"tiger.mp3",     t:"#ffd9a8" },
  { e:"🐘", he:"פִּיל",         en:"Elephant",   wiki:"African elephant",      f:"elephant.mp3",  t:"#dcd6ee" },
  { e:"🦒", he:"גִ'ירָפָה",     en:"Giraffe",    wiki:"Giraffe",               f:"giraffe.mp3",   t:"#fff0bf" },
  { e:"🦓", he:"זֶבְּרָה",       en:"Zebra",      wiki:"Zebra",                 f:"zebra.mp3",     t:"#e8e8e8" },
  { e:"🐒", he:"קוֹף",          en:"Monkey",     wiki:"Macaque",               f:"monkey.mp3",    t:"#ffe0b8" },
  { e:"🦍", he:"גּוֹרִילָה",     en:"Gorilla",    wiki:"Gorilla",               f:"gorilla.mp3",   t:"#d7d7df" },
  { e:"🐻", he:"דֹּב",          en:"Bear",       wiki:"Brown bear",            f:"bear.mp3",      t:"#e6cfb0" },
  { e:"🐼", he:"פַּנְדָּה",       en:"Panda",      wiki:"Giant panda",           s:"squeak",p:{soft:1},           t:"#eeeeee" },
  { e:"🐨", he:"קוֹאָלָה",       en:"Koala",      wiki:"Koala",                 s:"grunt", p:{low:120},          t:"#dcdce4" },
  { e:"🦘", he:"קֶנְגּוּרוּ",     en:"Kangaroo",   wiki:"Kangaroo",              s:"grunt", p:{low:150},          t:"#ffdcc0" },
  { e:"🐊", he:"תַּנִּין",        en:"Crocodile",  wiki:"Crocodile",             f:"crocodile.mp3", t:"#cfe8c0" },

/* ============================================================
   Web Audio
============================================================ */
let AC;
function ctx() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === "suspended") AC.resume();
  return AC;
}

const soundBufs  = {};
const soundFetch = {};
let   curSrc = null, capTimer = null;

function stopSound() {
  clearTimeout(capTimer);
  if (curSrc) { try { curSrc.stop(); } catch(e) {} curSrc = null; }
  loadingDot.style.display = "none";
}

async function playFile(filename) {
  const c = ctx();
  stopSound();

  if (soundBufs[filename]) {
    _startBuffer(c, soundBufs[filename]);
    return true;
  }

  loadingDot.style.display = "block";

  if (!soundFetch[filename]) {
    soundFetch[filename] = fetch("sounds/" + filename)
      .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.arrayBuffer(); })
      .then(arr => c.decodeAudioData(arr))
      .then(buf => { soundBufs[filename] = buf; return buf; })
      .catch(err => { console.warn("sound load failed:", filename, err); return null; });
  }

  const buf = await soundFetch[filename];
  loadingDot.style.display = "none";
  if (buf) { _startBuffer(c, buf); return true; }
  return false;
}

function _startBuffer(c, buf) {
  stopSound();
  const src = c.createBufferSource();
  src.buffer = buf;
  const gain = c.createGain();
  gain.gain.value = 0.85;
  src.connect(gain).connect(c.destination);
  src.start(0);
  curSrc = src;
  capTimer = setTimeout(() => {
    try { src.stop(); } catch(e) {}
    curSrc = null;
  }, 5000);
}

function master(c) {
  const comp = c.createDynamicsCompressor();
  comp.threshold.value = -12; comp.ratio.value = 8;
  const g = c.createGain(); g.gain.value = 0.9;
  g.connect(comp).connect(c.destination); return g;
}
function tone(c,out,o){
  const{wave="sine",f0,f1=f0,t,dur,peak=0.3,atk=0.012,vibHz=0,vibDepth=0}=o;
  const osc=c.createOscillator(); osc.type=wave;
  osc.frequency.setValueAtTime(f0,t);
  osc.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
  const g=c.createGain();
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(peak,t+atk);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  osc.connect(g).connect(out);
  if(vibHz){const l=c.createOscillator();l.frequency.value=vibHz;
    const lg=c.createGain();lg.gain.value=vibDepth;l.connect(lg).connect(osc.frequency);
    l.start(t);l.stop(t+dur);}
  osc.start(t);osc.stop(t+dur+0.05);
}
function noise(c,out,o){
  const{t,dur,peak=0.3,type="highpass",freq=1000,f1,q=1}=o;
  const src=c.createBufferSource();
  const buf=c.createBuffer(1,Math.max(1,c.sampleRate*dur),c.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  src.buffer=buf;
  const f=c.createBiquadFilter();f.type=type;f.frequency.setValueAtTime(freq,t);
  if(f1)f.frequency.exponentialRampToValueAtTime(f1,t+dur);f.Q.value=q;
  const g=c.createGain();
  g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(peak,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  src.connect(f).connect(g).connect(out);src.start(t);src.stop(t+dur);
}
const RECIPES={
  roar(c,o,t,p){const low=p.low||110,dur=p.dur||0.8;
    tone(c,o,{wave:"sawtooth",f0:low*1.5,f1:low,t,dur,peak:0.34,vibHz:24,vibDepth:16});
    noise(c,o,{t,dur,peak:0.12,type:"lowpass",freq:800});},
  grunt(c,o,t,p){const low=p.low||130,dur=p.dur||0.22;
    tone(c,o,{wave:"square",f0:low,f1:low*.8,t,dur,peak:0.3});
    tone(c,o,{wave:"square",f0:low,f1:low*.8,t:t+dur+0.08,dur,peak:0.26});},
  squeak(c,o,t,p){const b=p.low?1100:1500,pk=p.soft?.2:.3;
    tone(c,o,{wave:"sine",f0:b,f1:b*1.5,t,dur:.1,peak:pk});
    tone(c,o,{wave:"sine",f0:b*1.1,f1:b*1.6,t:t+.16,dur:.1,peak:pk});},
  tweet(c,o,t){[1900,2500,2100].forEach((f,i)=>
    tone(c,o,{wave:"sine",f0:f,f1:f*1.3,t:t+i*.13,dur:.1,peak:.26}));},
  squawk(c,o,t,p){const b=p.hi?1100:800;
    tone(c,o,{wave:"sawtooth",f0:b,f1:b*.7,t,dur:.18,peak:.28});
    noise(c,o,{t,dur:.18,peak:.1,type:"bandpass",freq:b*1.5,q:1.5});
    tone(c,o,{wave:"sawtooth",f0:b,f1:b*.7,t:t+.26,dur:.18,peak:.25});},
};

function playAnimal(a) {
  if ("speechSynthesis" in window) speechSynthesis.cancel();
  if (a.f) {
    playFile(a.f);
  } else {
    const c = ctx(), out = master(c), t = c.currentTime + 0.03;
    (RECIPES[a.s] || RECIPES.grunt)(c, out, t, a.p || {});
  }
  flashBtn(soundBtn, 1200);
}

/* ============================================================
   תמונות — Wikipedia REST API + localStorage cache
============================================================ */
const IMG_V  = "nelly3_";
const imgMem = {};

async function getPhoto(a) {
  if (imgMem[a.en]) return imgMem[a.en];
  const lsKey = IMG_V + a.en;
  const hit   = localStorage.getItem(lsKey);
  if (hit) { imgMem[a.en] = hit; return hit; }

  try {
    const wikiTitle = encodeURIComponent(a.wiki || a.en);
    const r = await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${wikiTitle}`,
      { headers: { "Api-User-Agent": "NellyZoo/1.0 (kids-edu)" } }
    );
    if (!r.ok) return null;
    const d = await r.json();
    let url = d.thumbnail?.source || null;
    if (url) {
      url = url.replace(/\/\d+px-/, "/500px-");
      localStorage.setItem(lsKey, url);
      imgMem[a.en] = url;
    }
    return url;
  } catch(e) {
    return null;
  }
}

function loadPhoto(a) {
  animalPhoto.classList.remove("show");
  animalPhoto.src = "";

  getPhoto(a).then(url => {
    if (!url || ANIMALS[idx].en !== a.en) return;
    const img = new Image();
    img.onload = () => {
      if (ANIMALS[idx].en !== a.en) return;
      animalPhoto.src = url;
      animalPhoto.classList.add("show");
    };
    img.src = url;
  });
}

/* ============================================================
   ניצוצות
============================================================ */
function sparkle(x, y) {
  ["✨","⭐","💫","🌟"].forEach((ch, i) => {
    const s = document.createElement("div");
    s.className = "spark"; s.textContent = ch;
    const ang = (Math.PI * 2 * i) / 4, dist = 55 + Math.random() * 40;
    s.style.left = x + "px"; s.style.top = y + "px";
    s.style.setProperty("--dx", Math.cos(ang) * dist + "px");
    s.style.setProperty("--dy", Math.sin(ang) * dist + "px");
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 700);
  });
}

/* ============================================================
   חגיגה — כל החיות נראו!
============================================================ */
function celebrate() {
  const overlay = document.createElement("div");
  overlay.className = "celebrate";
  overlay.innerHTML = `
    <div class="celebrate-inner">
      <div class="celebrate-emoji">🎉</div>
      <div class="celebrate-title">כל הכבוד נלי!</div>
      <div class="celebrate-sub">ראית את כל ${ANIMALS.length} החיות בגן!</div>
      <button class="celebrate-btn" id="celebrateClose">עוד פעם! 🔄</button>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById("celebrateClose").onclick = () => {
    overlay.remove();
    celebrated = false;
  };

  for (let i = 0; i < 24; i++) {
    setTimeout(() => sparkle(
      Math.random() * window.innerWidth,
      Math.random() * window.innerHeight * 0.8
    ), i * 60);
  }
}

function checkCelebrate() {
  if (!celebrated && visited.size === ANIMALS.length) {
    celebrated = true;
    setTimeout(celebrate, 800);
  }
}

/* ============================================================
   הצגה וניווט
============================================================ */
function render(anim = "pop") {
  const a = ANIMALS[idx];
  visited.add(idx);

  emojiEl.textContent  = a.e;
  nameHeEl.textContent = a.he;
  nameEnEl.textContent = a.en;
  cardEl.style.setProperty("--tint", a.t);

  const pct = (visited.size / ANIMALS.length * 100).toFixed(0);
  progressEl.style.width = pct + "%";
  counterEl.textContent  = `חיה ${idx + 1} מתוך ${ANIMALS.length}`;

  animalView.classList.remove("pop", "wiggle");
  void animalView.offsetWidth;
  animalView.classList.add(anim);

  loadPhoto(a);

  document.querySelectorAll(".tile").forEach((tl, i) =>
    tl.classList.toggle("active", i === idx));
}

function go(step) {
  idx = (idx + step + ANIMALS.length) % ANIMALS.length;
  render("pop");
  playAnimal(ANIMALS[idx]);
  checkCelebrate();
}

/* ============================================================
   דיבור — עברית ואנגלית
============================================================ */
let voices = [];
function loadVoices() { voices = speechSynthesis.getVoices() || []; }
if ("speechSynthesis" in window) { loadVoices(); speechSynthesis.onvoiceschanged = loadVoices; }

// בחירת קול מתאים לשפה — נפתר מחדש בכל לחיצה (הרשימה לפעמים ריקה בטעינה)
function voiceFor(lang) {
  if (!voices.length) loadVoices();
  if (/^he/i.test(lang)) {
    return voices.find(x => /^he/i.test(x.lang)) || null;
  }
  return voices.find(x => /en[-_]US/i.test(x.lang) && /samantha|female|zira|google/i.test(x.name))
      || voices.find(x => /^en/i.test(x.lang)) || null;
}

// הסרת ניקוד — מנועי הקראה רבים נכשלים על אותיות מנוקדות ולא משמיעים כלום
const NIKUD = /[\u0591-\u05C7]/g;
function stripNikud(s) { return s.replace(NIKUD, ""); }

function say(text, lang, btn) {
  if (!("speechSynthesis" in window)) return;
  stopSound();
  speechSynthesis.cancel();
  const clean = /^he/i.test(lang) ? stripNikud(text) : text;
  const u = new SpeechSynthesisUtterance(clean);
  u.lang = lang; u.rate = 0.8; u.pitch = 1.12;
  const v = voiceFor(lang);
  if (v) u.voice = v;
  u.onstart = () => btn.classList.add("playing");
  u.onend   = () => btn.classList.remove("playing");
  u.onerror = () => btn.classList.remove("playing");
  speechSynthesis.speak(u);
  flashBtn(btn, 1400);
}

// הקראת השם בעברית — קודם קובץ קול אמיתי (עובד בכל מכשיר),
// ואם חסר/נכשל — נופלים חזרה לקול הסינתטי של הדפדפן
async function sayHebrew(a, btn) {
  if ("speechSynthesis" in window) speechSynthesis.cancel();
  flashBtn(btn, 1300);
  const played = await playFile("he/" + a.en.toLowerCase() + ".mp3");
  if (!played) say(a.he, "he-IL", btn);
}

function flashBtn(btn, ms) {
  btn.classList.add("playing");
  setTimeout(() => btn.classList.remove("playing"), ms);
}

/* ============================================================
   אירועים
============================================================ */
document.getElementById("next").onclick = () => go(1);
document.getElementById("prev").onclick = () => go(-1);

soundBtn.onclick = () => {
  playAnimal(ANIMALS[idx]);
  animalView.classList.remove("wiggle"); void animalView.offsetWidth; animalView.classList.add("wiggle");
};

sayHeBtn.onclick = () => sayHebrew(ANIMALS[idx], sayHeBtn);
sayBtn.onclick   = () => say(ANIMALS[idx].en, "en-US", sayBtn);

nameHeEl.addEventListener("click", () => sayHebrew(ANIMALS[idx], sayHeBtn));

animalView.addEventListener("click", e => {
  playAnimal(ANIMALS[idx]);
  animalView.classList.remove("wiggle"); void animalView.offsetWidth; animalView.classList.add("wiggle");
  const r = animalView.getBoundingClientRect();
  sparkle(r.left + r.width / 2, r.top + r.height / 2);
});

// החלקה (RTL: שמאלה = הבא)
let tx = null;
document.querySelector(".stage").addEventListener("touchstart", e => tx = e.touches[0].clientX, { passive: true });
document.querySelector(".stage").addEventListener("touchend", e => {
  if (tx === null) return;
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) go(dx > 0 ? -1 : 1);
  tx = null;
}, { passive: true });

// מקלדת
document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft")  go(1);
  if (e.key === "ArrowRight") go(-1);
  if (e.key === " " || e.key === "Enter") {
    playAnimal(ANIMALS[idx]);
    animalView.classList.remove("wiggle"); void animalView.offsetWidth; animalView.classList.add("wiggle");
  }
});

   רשת כל החיות
============================================================ */
const grid = document.getElementById("grid");
ANIMALS.forEach((a, i) => {
  const tl = document.createElement("button");
  tl.className = "tile";
  tl.innerHTML = `<div class="te">${a.e}</div><div class="tn">${a.he}</div>`;
  tl.onclick = () => {
    idx = i; render("pop"); playAnimal(a); closeSheet();
    checkCelebrate();
  };
  grid.appendChild(tl);
});

const sheet = document.getElementById("sheet");
function openSheet()  { sheet.classList.add("open"); }
function closeSheet() { sheet.classList.remove("open"); }
document.getElementById("openAll").onclick    = openSheet;
document.getElementById("closeSheet").onclick = closeSheet;
sheet.addEventListener("click", e => { if (e.target === sheet) closeSheet(); });

function preloadAdjacent() {
  [1, -1, 2, -2].forEach(d => {
    const i = (idx + d + ANIMALS.length) % ANIMALS.length;
    getPhoto(ANIMALS[i]);
  });
}

/* ============================================================
   משחק "מי אני?" — שומעים קול, בוחרים את החיה הנכונה
============================================================ */
const gameEl       = document.getElementById("game");
const gameOptionsEl= document.getElementById("gameOptions");
const gameScoreEl  = document.getElementById("gameScore");
const gameFeedback = document.getElementById("gameFeedback");
const gameListenBtn= document.getElementById("gameListen");
let   gameScore    = 0;
let   gameAnswer   = null;
let   gameLocked   = false;

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function newRound() {
  gameLocked = false;
  gameFeedback.textContent = "";

  // בחר חיה נכונה + 3 מסיחים
  const pool    = shuffle(ANIMALS);
  gameAnswer    = pool[0];
  const options = shuffle(pool.slice(0, 4));

  gameOptionsEl.innerHTML = "";
  options.forEach(a => {
    const opt = document.createElement("button");
    opt.className = "game-opt";
    opt.innerHTML = `<div class="oe">${a.e}</div><div class="on">${a.he}</div>`;
    opt.onclick = () => guess(a, opt);
    gameOptionsEl.appendChild(opt);
  });

  setTimeout(() => playAnimal(gameAnswer), 350);
}

function guess(a, optEl) {
  if (gameLocked) return;
  gameLocked = true;

  if (a.en === gameAnswer.en) {
    optEl.classList.add("correct");
    gameScore++;
    gameScoreEl.textContent = "⭐ " + gameScore;
    gameFeedback.textContent = "כל הכבוד! 🎉";
    const r = optEl.getBoundingClientRect();
    sparkle(r.left + r.width / 2, r.top + r.height / 2);
    sayHebrew(gameAnswer, sayHeBtn);
    setTimeout(newRound, 1500);
  } else {
    optEl.classList.add("wrong");
    gameFeedback.textContent = "כמעט! נסו שוב 🙂";
    // הדגש את הנכונה אחרי רגע
    setTimeout(() => {
      gameLocked = false;
      optEl.classList.remove("wrong");
      gameFeedback.textContent = "";
    }, 900);
  }
}

function openGame() {
  gameScore = 0;
  gameScoreEl.textContent = "⭐ 0";
  gameEl.classList.add("open");
  newRound();
}
function closeGame() { gameEl.classList.remove("open"); stopSound(); }

document.getElementById("openGame").onclick  = openGame;
document.getElementById("closeGame").onclick = closeGame;
gameListenBtn.onclick = () => {
  if (gameAnswer) {
    playAnimal(gameAnswer);
    gameListenBtn.classList.add("pulse");
    setTimeout(() => gameListenBtn.classList.remove("pulse"), 1200);
  }
};

render("pop");
setTimeout(preloadAdjacent, 1000);
</script>
